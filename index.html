<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Shop</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
    <h2>ModernShop</h2>
    <input type="text" id="search" placeholder="Search products...">
    <button onclick="toggleCart()">🛒 <span id="cart-count">0</span></button>
</nav>


<section class="hero">
    <h1>Big Sale 50% Off</h1>
    <p>Upgrade your style today</p>
</section>


<section class="filters">
    <button onclick="filterProducts('all')">All</button>
    <button onclick="filterProducts('electronics')">Electronics</button>
    <button onclick="filterProducts('clothes')">Clothes</button>
</section>


<section class="products" id="product-list"></section>


<div class="cart-sidebar" id="cart">
    <h3>Your Cart</h3>
    <div id="cart-items"></div>
    <h4>Total: ₹<span id="total">0</span></h4>
    <button onclick="clearCart()">Clear Cart</button>
</div>

<script src="script.js"></script>
</body>
</html>
